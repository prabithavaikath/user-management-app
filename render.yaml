services:
  # Backend API Service
  - type: web
    name: user-management-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.17.0

  # Frontend Static Site
  - type: web
    name: user-management-app
    runtime: node
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: REACT_APP_API_URL
        value: https://user-management-api.onrender.com/api